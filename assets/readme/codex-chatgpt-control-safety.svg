<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">codex-chatgpt-control safety banner</title>
  <desc id="desc">A safety-focused banner showing user approval, visible browser actions, structured blockers, and redacted local reports.</desc>
  <style>
    :root {
      --bg: #f5f6f8;
      --ink: #111827;
      --muted: #5f6b7a;
      --panel: #ffffff;
      --line: #d7dee8;
      --teal: #2d9a8d;
      --blue: #4678b8;
      --gold: #c9952d;
      --red: #cf5f51;
      --green: #469460;
      --shadow: rgba(17, 24, 39, 0.10);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --ink: #edf2f7;
        --muted: #a1adbb;
        --panel: #151b23;
        --line: #303946;
        --teal: #54c8bc;
        --blue: #83b5f8;
        --gold: #dcb45e;
        --red: #ea8278;
        --green: #72ca88;
        --shadow: rgba(0, 0, 0, 0.30);
      }
    }

    .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
    .title { fill: var(--ink); font-size: 52px; font-weight: 760; letter-spacing: 0; }
    .subtitle { fill: var(--muted); font-size: 24px; font-weight: 450; letter-spacing: 0; }
    .label { fill: var(--ink); font-size: 22px; font-weight: 710; letter-spacing: 0; }
    .small { fill: var(--muted); font-size: 16px; font-weight: 520; letter-spacing: 0; }
    .panel { fill: var(--panel); stroke: var(--line); stroke-width: 1.5; filter: drop-shadow(0 18px 34px var(--shadow)); }
  </style>

  <rect width="1280" height="520" fill="var(--bg)" />
  <g transform="translate(78 70)">
    <text class="title sans" x="0" y="0" dominant-baseline="hanging">Visible user intent, clear stop reasons.</text>
    <text class="subtitle sans" x="1" y="82">Prompts, files, downloads, and blockers stay legible in the browser.</text>
  </g>

  <g transform="translate(82 208)">
    <rect class="panel" x="0" y="0" width="250" height="188" rx="8" />
    <circle cx="72" cy="70" r="34" fill="none" stroke="var(--green)" stroke-width="5" />
    <path d="M55 70 l13 13 l28 -32" fill="none" stroke="var(--green)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
    <text class="label sans" x="32" y="136">User approval</text>
    <text class="small mono" x="32" y="164">visible prompts</text>
  </g>

  <g transform="translate(380 208)">
    <rect class="panel" x="0" y="0" width="250" height="188" rx="8" />
    <rect x="42" y="46" width="166" height="94" rx="8" fill="none" stroke="var(--blue)" stroke-width="4" />
    <path d="M77 93 C103 62 147 62 173 93 C147 124 103 124 77 93 Z" fill="none" stroke="var(--teal)" stroke-width="4" />
    <circle cx="125" cy="93" r="13" fill="none" stroke="var(--teal)" stroke-width="4" />
    <text class="label sans" x="32" y="164">Visible browser</text>
  </g>

  <g transform="translate(678 208)">
    <rect class="panel" x="0" y="0" width="250" height="188" rx="8" />
    <path d="M62 50 h126 v86 H62 Z" fill="none" stroke="var(--gold)" stroke-width="4" />
    <path d="M86 75 h78 M86 99 h52" stroke="var(--line)" stroke-width="9" stroke-linecap="round" />
    <path d="M181 42 l25 25 M206 42 l-25 25" stroke="var(--red)" stroke-width="6" stroke-linecap="round" />
    <text class="label sans" x="32" y="164">Clear blockers</text>
  </g>

  <g transform="translate(976 208)">
    <rect class="panel" x="0" y="0" width="222" height="188" rx="8" />
    <path d="M43 55 h136 M43 84 h108 M43 113 h132" stroke="var(--line)" stroke-width="10" stroke-linecap="round" />
    <rect x="105" y="76" width="74" height="17" rx="8.5" fill="var(--ink)" opacity="0.82" />
    <text class="label sans" x="28" y="164">Redacted report</text>
  </g>

  <path d="M345 302 h22 M643 302 h22 M941 302 h22" stroke="var(--line)" stroke-width="3" stroke-linecap="round" />
  <path d="M359 294 l10 8 l-10 8 M657 294 l10 8 l-10 8 M955 294 l10 8 l-10 8" fill="none" stroke="var(--line)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
</svg>
