name: Bug report
description: Report a reproducible SDK bug with public-safe details.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Do not include credentials, private ChatGPT content, raw browser state, or real thread URLs.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - packages/node
        - packages/python
        - docs
        - unknown
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest public-safe reproduction steps.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include structured blockers or redacted logs if available.
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Node, npm, Python, package version, OS.
      placeholder: "Node 24, Python 3.12, macOS ..."
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I have removed credentials, private ChatGPT content, and real thread URLs.
          required: true
