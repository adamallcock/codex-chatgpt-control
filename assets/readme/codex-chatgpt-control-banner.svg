<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">codex-chatgpt-control banner</title>
  <desc id="desc">A restrained developer-tool banner showing Codex, a browser bridge, a visible ChatGPT session, and a local report flow.</desc>
  <style>
    :root {
      --bg: #f6f8fa;
      --panel: #ffffff;
      --panel-2: #f1f5f9;
      --ink: #111827;
      --muted: #52606d;
      --line: #d7dee8;
      --line-strong: #a9b5c4;
      --teal: #2a9d8f;
      --blue: #3778c2;
      --gold: #d79a21;
      --green: #3c9d5d;
      --red: #d65a4a;
      --shadow: rgba(15, 23, 42, 0.10);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --panel: #151b23;
        --panel-2: #10161f;
        --ink: #eef2f7;
        --muted: #9fb0c3;
        --line: #303946;
        --line-strong: #4c5968;
        --teal: #46c7b8;
        --blue: #7ab7ff;
        --gold: #e1b455;
        --green: #65c983;
        --red: #ee7c6f;
        --shadow: rgba(0, 0, 0, 0.28);
      }
    }

    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
    .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .title { fill: var(--ink); font-size: 58px; font-weight: 720; letter-spacing: 0; }
    .subtitle { fill: var(--muted); font-size: 25px; font-weight: 450; letter-spacing: 0; }
    .label { fill: var(--ink); font-size: 18px; font-weight: 700; letter-spacing: 0; }
    .small { fill: var(--muted); font-size: 14px; font-weight: 520; letter-spacing: 0; }
    .code { fill: var(--muted); font-size: 18px; letter-spacing: 0; }
    .panel { fill: var(--panel); stroke: var(--line); stroke-width: 1.5; filter: drop-shadow(0 16px 32px var(--shadow)); }
    .mini { fill: var(--panel-2); stroke: var(--line); stroke-width: 1.2; }
    .arrow { fill: none; stroke: var(--line-strong); stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1280" height="520" rx="0" fill="var(--bg)" />
  <path d="M0 392 C166 348 269 420 418 376 C562 334 678 244 844 285 C1017 328 1112 264 1280 208 L1280 520 L0 520 Z" fill="var(--panel-2)" opacity="0.72" />

  <g transform="translate(78 72)">
    <text class="title sans" x="0" y="0" dominant-baseline="hanging">codex-chatgpt-control</text>
    <text class="subtitle sans" x="3" y="82">Visible-session browser workflows for Codex agents.</text>
    <g transform="translate(4 138)">
      <rect x="0" y="0" width="184" height="34" rx="17" fill="none" stroke="var(--line)" />
      <circle cx="22" cy="17" r="5" fill="var(--green)" />
      <text class="small mono" x="38" y="22">user-directed</text>

      <rect x="204" y="0" width="177" height="34" rx="17" fill="none" stroke="var(--line)" />
      <circle cx="226" cy="17" r="5" fill="var(--teal)" />
      <text class="small mono" x="242" y="22">visible UI</text>

      <rect x="401" y="0" width="188" height="34" rx="17" fill="none" stroke="var(--line)" />
      <circle cx="423" cy="17" r="5" fill="var(--gold)" />
      <text class="small mono" x="439" y="22">local reports</text>
    </g>
  </g>

  <g transform="translate(78 278)">
    <rect class="panel" x="0" y="0" width="238" height="150" rx="8" />
    <circle cx="28" cy="30" r="7" fill="var(--red)" />
    <circle cx="52" cy="30" r="7" fill="var(--gold)" />
    <circle cx="76" cy="30" r="7" fill="var(--green)" />
    <text class="label sans" x="26" y="76">Codex agent</text>
    <text class="code mono" x="26" y="110">&gt; askInThread()</text>
    <text class="small mono" x="26" y="132">repo, tests, branch</text>
  </g>

  <g transform="translate(377 278)">
    <rect class="panel" x="0" y="0" width="238" height="150" rx="8" />
    <rect class="mini" x="24" y="26" width="190" height="98" rx="7" />
    <path d="M70 80 L114 52 L158 80 L114 108 Z" fill="none" stroke="var(--teal)" stroke-width="4" stroke-linejoin="round" />
    <text class="label sans" x="26" y="148">Browser bridge</text>
  </g>

  <g transform="translate(676 278)">
    <rect class="panel" x="0" y="0" width="238" height="150" rx="8" />
    <rect class="mini" x="23" y="23" width="192" height="104" rx="7" />
    <rect x="44" y="45" width="92" height="12" rx="6" fill="var(--line-strong)" opacity="0.72" />
    <rect x="44" y="70" width="145" height="11" rx="5.5" fill="var(--line)" />
    <rect x="44" y="93" width="118" height="11" rx="5.5" fill="var(--line)" />
    <path d="M171 44 C185 48 192 58 193 75 C193 95 180 110 162 111 C144 111 132 99 132 81 C132 62 145 47 162 44 Z" fill="none" stroke="var(--blue)" stroke-width="3" />
    <text class="label sans" x="26" y="148">Visible ChatGPT</text>
  </g>

  <g transform="translate(975 278)">
    <rect class="panel" x="0" y="0" width="226" height="150" rx="8" />
    <path d="M37 43 H189 M37 73 H169 M37 103 H135" stroke="var(--line-strong)" stroke-width="9" stroke-linecap="round" />
    <path d="M172 97 l16 16 l31 -38" fill="none" stroke="var(--green)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    <text class="label sans" x="26" y="148">Structured result</text>
  </g>

  <path class="arrow" d="M326 353 H364" />
  <path class="arrow" d="M354 343 L366 353 L354 363" />
  <path class="arrow" d="M625 353 H663" />
  <path class="arrow" d="M653 343 L665 353 L653 363" />
  <path class="arrow" d="M924 353 H962" />
  <path class="arrow" d="M952 343 L964 353 L952 363" />
</svg>
