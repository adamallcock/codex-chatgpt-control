name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: release preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Node dependencies
        run: npm --prefix packages/node ci
      - name: Install Python release tools
        run: python -m pip install --upgrade build twine
      - run: npm run release:check-version
      - run: npm run release:check-names
      - run: npm run node:test
      - run: npm run node:build
      - run: npm run node:bundle
      - run: npm run node:contracts
      - run: npm run python:test
      - run: npm run python:compile
      - run: npm run python:pyright
      - run: npm run python:ordinary-shell
      - run: npm run plugin:validate
      - run: npm run plugin:check
      - run: npm run release:check-node-pack
      - name: Build and check Python distributions
        run: |
          rm -rf packages/python/.venv dist/python
          npm run release:build-python
          npm run release:check-python

  package-smoke-macos:
    name: release package smoke (macos-latest)
    needs: preflight
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/node/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: npm --prefix packages/node ci
      - run: python -m pip install --upgrade build
      - run: npm run node:build
      - run: npm run node:bundle
      - run: npm run release:check-node-pack
      - run: npm run release:smoke-source

  publish-npm:
    name: publish npm
    needs: [preflight, package-smoke-macos]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm --prefix packages/node ci
      - run: npm run release:check-version
      - run: npm run node:build
      - run: npm run node:bundle
      - run: npm run release:check-node-pack
      - name: Publish Node package to npm
        working-directory: packages/node
        run: npm publish --provenance --access public --tag next

  publish-pypi:
    name: publish PyPI
    needs: [preflight, package-smoke-macos]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade build twine
      - run: npm run release:check-version
      - name: Build and check Python distributions
        run: |
          rm -rf dist/python
          npm run release:build-python
          npm run release:check-python
      - name: Publish Python package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/python

  verify-published:
    name: verify published registry installs
    needs: [publish-npm, publish-pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: npm run release:verify-published

  github-release:
    name: publish GitHub prerelease
    needs: verify-published
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Publish release notes for the verified tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          --repo "${GITHUB_REPOSITORY}"
          --verify-tag
          --prerelease
          --generate-notes
          --title "ChatGPT Surface Control ${GITHUB_REF_NAME#v}"
